services:
  mysql:
    image: mysql:8.4
    container_name: alcoholic-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: alcoholic
      MYSQL_DATABASE: alcoholic
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - alcoholic_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

volumes:
  alcoholic_mysql_data:
